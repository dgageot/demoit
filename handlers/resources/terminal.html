<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1b26; }
        #terminal { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script type="module">
        // Use ghostty-web from PR #136 branch via jsDelivr GitHub proxy.
        // https://github.com/coder/ghostty-web/pull/136
        const { init, Terminal } = await import(
            'https://cdn.jsdelivr.net/gh/coder/ghostty-web@jmcampanini/fix-wheel-events/dist/ghostty-web.js'
        );

        await init();

        const container = document.getElementById('terminal');
        const term = new Terminal({
            fontSize: 14,
            fontFamily: 'monospace',
            cursorBlink: true,
            scrollback: 10000,
            theme: {
                background: '#1a1b26',
                foreground: '#a9b1d6',
            },
        });

        term.open(container);

        // Connect to the WebSocket PTY backend.
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(proto + '//' + location.host + '/ws/terminal' + location.search);
        ws.binaryType = 'arraybuffer';

        ws.onopen = () => {
            // Forward user input to the server.
            term.onData((data) => {
                ws.send(data);
            });

            // Send initial resize.
            sendResize();

            // Handle terminal resize.
            term.onResize(sendResize);
        };

        ws.onmessage = (e) => {
            if (e.data instanceof ArrayBuffer) {
                term.write(new Uint8Array(e.data));
            } else {
                term.write(e.data);
            }
        };

        ws.onclose = () => {
            term.write('\r\n\x1b[90m[Session ended]\x1b[0m\r\n');
        };

        function sendResize() {
            ws.send(JSON.stringify({
                type: 'resize',
                cols: term.cols || 80,
                rows: term.rows || 24,
            }));
        }

        // Resize terminal when the window resizes.
        new ResizeObserver(() => {
            if (ws.readyState === WebSocket.OPEN) {
                sendResize();
            }
        }).observe(container);
    </script>
</body>
</html>
